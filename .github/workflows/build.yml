name: Build Protokolle IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build App
        run: |
          xcodebuild clean build \
          -project Protokolle.xcodeproj \
          -scheme Protokolle \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/Protokolle.app Payload/
          zip -r Protokolle.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Protokolle-IPA
          path: Protokolle.ipa
